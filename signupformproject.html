<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form Project</title>
    <link rel="stylesheet" href="signupformproject.css">
</head>
<body>
    <div class="pagecontainer">
        <div class="sidebar">
            <div class="logocontainer">
                
                    <img src="/Images/odin-lined.png" alt="" class="logoimg">
                    <p class="logotext">ODIN</p>
                    
            </div>
            <div class="credit">
                <p class="credittext">Photo by Nicolas J Leclercq on Unsplash</p>
            </div>
        </div>
        <div class="maincontent">
            <div class="formintro">
                <p class="introtext">This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.</p>
                <div class="introtext">Sign up now to get started.</div>
                <div class="spacer"></div>
                <p class="introtext">You know you want to.</p>
            </div>
            <div class="formcontainer">
                <div class="formleft">
                    <div class="firstname">FN</div>
                    <div class="email">EMAIL</div>
                    <div class="password">PWD</div>
                </div>
                <div class="formright">
                    <div class="lastname">LN</div>
                    <div class="phone">PHONE</div>
                    <div class="confirm">CNFRM</div>
                </div>
            </div>
            <div class="account"></div>
        </div>
    </div>
</body>
</html>
